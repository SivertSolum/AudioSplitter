name: Release Desktop App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project (changelog sync)
        run: pip install -e . --no-deps

      - name: Prepare release version and changelog
        id: release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $version = python scripts/sync_changelog.py --prepare-release
          if ($LASTEXITCODE -ne 0) {
            throw "sync_changelog.py --prepare-release failed with exit code $LASTEXITCODE."
          }
          $version = "$version".Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid release version '$version'. Expected a semver like 0.1.2."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM

          $changed = git status --porcelain CHANGELOG.md pyproject.toml src/splitter/__init__.py
          if (-not $changed) {
            throw "prepare-release did not modify version files."
          }
          "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM

      - name: Commit release version files
        id: version_commit
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $version = "${{ steps.release.outputs.version }}"
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release version output is missing or invalid: '$version'."
          }
          git add CHANGELOG.md pyproject.toml src/splitter/__init__.py
          git commit -m "chore: release v$version [skip ci]"
          git push
          "sha=$(git rev-parse HEAD)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM

      - name: Install PyTorch (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install Demucs fork and desktop build tools
        run: |
          pip install dora-search einops julius lameenc openunmix pyyaml tqdm typer rich pywebview pyinstaller yt-dlp
          pip install --no-deps "demucs @ git+https://github.com/adefossez/demucs@b9ab48cad45976ba42b2ff17b229c071f0df9390"
          pip install -e ".[desktop]" --no-deps

      - name: Build executable
        run: pyinstaller --noconfirm build/splitter-desktop.spec

      - name: Bundle ffmpeg
        shell: pwsh
        run: |
          $ffmpegZip = "$env:RUNNER_TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpegBin = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ffmpegBin) { throw "ffmpeg.exe not found in downloaded archive." }
          Copy-Item $ffmpegBin.FullName "dist/AudioSplitter/ffmpeg.exe"

      - name: Create release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ steps.release.outputs.version }}"
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release version output is missing or invalid: '$version'."
          }

          $zip = "AudioSplitter-$version-Windows-x64.zip"
          $distPath = "dist/AudioSplitter"
          if (-not (Test-Path $distPath)) {
            throw "Build output not found: $distPath"
          }

          $distBytes = (Get-ChildItem $distPath -Recurse -File | Measure-Object -Property Length -Sum).Sum
          Write-Host ("Build folder size: {0:N1} MB" -f ($distBytes / 1MB))

          Compress-Archive -Path "$distPath/*" -DestinationPath $zip -Force

          $zipBytes = (Get-Item $zip).Length
          Write-Host ("Archive size: {0:N1} MB" -f ($zipBytes / 1MB))
          if ($zipBytes -ge 2147483648) {
            throw "Release archive exceeds GitHub's 2 GB limit ($([math]::Round($zipBytes / 1GB, 2)) GB)."
          }

      - name: Extract release notes from CHANGELOG
        run: python scripts/sync_changelog.py --extract release-notes.md --version ${{ steps.release.outputs.version }}

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ steps.release.outputs.version }}"
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release version output is missing or invalid: '$version'."
          }
          $tag = "v$version"
          $zip = "AudioSplitter-$version-Windows-x64.zip"
          if (-not (Test-Path $zip)) {
            throw "Release archive not found: $zip"
          }
          $zipBytes = (Get-Item $zip).Length
          if ($zipBytes -ge 2147483648) {
            throw "Release archive exceeds GitHub's 2 GB limit ($([math]::Round($zipBytes / 1GB, 2)) GB)."
          }
          $target = "${{ steps.version_commit.outputs.sha }}"
          if (-not $target) {
            $target = git rev-parse HEAD
          }

          $releaseExists = $false
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }

          if ($releaseExists) {
            Write-Host "Release $tag already exists; uploading asset with --clobber."
            gh release upload $tag $zip --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh release edit $tag --title "Audio Splitter $version" --notes-file release-notes.md --latest
            exit $LASTEXITCODE
          }

          $maxAttempts = 5
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Creating release $tag (attempt $attempt/$maxAttempts)..."
            gh release create $tag `
              --target $target `
              --title "Audio Splitter $version" `
              --notes-file release-notes.md `
              $zip `
              --latest
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Release create failed; waiting 15s before retry..."
              Start-Sleep -Seconds 15
            }
          }
          exit 1
