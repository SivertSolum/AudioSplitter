name: Release Desktop App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (changelog sync)
        run: pip install -e .

      - name: Prepare release version and changelog
        id: release
        shell: pwsh
        run: |
          $version = python scripts/sync_changelog.py --prepare-release
          "version=$version" >> $env:GITHUB_OUTPUT
          $changed = git status --porcelain CHANGELOG.md pyproject.toml src/splitter/__init__.py
          if ($changed) {
            "changed=true" >> $env:GITHUB_OUTPUT
          } else {
            "changed=false" >> $env:GITHUB_OUTPUT
          }

      - name: Commit release version files
        if: steps.release.outputs.changed == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $version = "${{ steps.release.outputs.version }}"
          git add CHANGELOG.md pyproject.toml src/splitter/__init__.py
          git commit -m "chore: release v$version [skip ci]"
          git push

      - name: Install PyTorch (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install desktop build tools
        run: pip install -e ".[desktop]"

      - name: Build executable
        run: pyinstaller --noconfirm build/splitter-desktop.spec

      - name: Bundle ffmpeg
        shell: pwsh
        run: |
          $ffmpegZip = "$env:RUNNER_TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpegBin = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ffmpegBin) { throw "ffmpeg.exe not found in downloaded archive." }
          Copy-Item $ffmpegBin.FullName "dist/AudioSplitter/ffmpeg.exe"

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          Compress-Archive -Path "dist/AudioSplitter/*" -DestinationPath "AudioSplitter-$version-Windows-x64.zip" -Force

      - name: Extract release notes from CHANGELOG
        run: python scripts/sync_changelog.py --extract release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release.outputs.version }}
          name: Audio Splitter ${{ steps.release.outputs.version }}
          body_path: release-notes.md
          files: AudioSplitter-${{ steps.release.outputs.version }}-Windows-x64.zip
          make_latest: true
