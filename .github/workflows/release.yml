name: Release Desktop App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (changelog sync)
        run: pip install -e .

      - name: Prepare release version and changelog
        id: release
        shell: pwsh
        run: |
          $version = python scripts/sync_changelog.py --prepare-release
          "version=$version" >> $env:GITHUB_OUTPUT
          $changed = git status --porcelain CHANGELOG.md pyproject.toml src/splitter/__init__.py
          if ($changed) {
            "changed=true" >> $env:GITHUB_OUTPUT
          } else {
            "changed=false" >> $env:GITHUB_OUTPUT
          }

      - name: Commit release version files
        id: version_commit
        if: steps.release.outputs.changed == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $version = "${{ steps.release.outputs.version }}"
          git add CHANGELOG.md pyproject.toml src/splitter/__init__.py
          git commit -m "chore: release v$version [skip ci]"
          git push
          "sha=$(git rev-parse HEAD)" >> $env:GITHUB_OUTPUT

      - name: Install PyTorch (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install desktop build tools
        run: pip install -e ".[desktop]"

      - name: Build executable
        run: pyinstaller --noconfirm build/splitter-desktop.spec

      - name: Bundle ffmpeg
        shell: pwsh
        run: |
          $ffmpegZip = "$env:RUNNER_TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpegBin = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ffmpegBin) { throw "ffmpeg.exe not found in downloaded archive." }
          Copy-Item $ffmpegBin.FullName "dist/AudioSplitter/ffmpeg.exe"

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          Compress-Archive -Path "dist/AudioSplitter/*" -DestinationPath "AudioSplitter-$version-Windows-x64.zip" -Force

      - name: Extract release notes from CHANGELOG
        run: python scripts/sync_changelog.py --extract release-notes.md

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $tag = "v$version"
          $zip = "AudioSplitter-$version-Windows-x64.zip"
          $target = "${{ steps.version_commit.outputs.sha }}"
          if (-not $target) {
            $target = git rev-parse HEAD
          }

          $releaseExists = $false
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }

          if ($releaseExists) {
            Write-Host "Release $tag already exists; uploading asset with --clobber."
            gh release upload $tag $zip --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh release edit $tag --title "Audio Splitter $version" --notes-file release-notes.md --latest
            exit $LASTEXITCODE
          }

          $maxAttempts = 5
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Creating release $tag (attempt $attempt/$maxAttempts)..."
            gh release create $tag `
              --target $target `
              --title "Audio Splitter $version" `
              --notes-file release-notes.md `
              $zip `
              --latest
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Release create failed; waiting 15s before retry..."
              Start-Sleep -Seconds 15
            }
          }
          exit 1
