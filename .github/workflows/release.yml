name: Release Desktop App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (changelog sync)
        run: pip install -e .

      - name: Promote changelog for current version
        id: changelog
        shell: pwsh
        run: |
          python scripts/sync_changelog.py --promote
          $changelogChanged = git status --porcelain CHANGELOG.md
          if ($changelogChanged) {
            "changed=true" >> $env:GITHUB_OUTPUT
          } else {
            "changed=false" >> $env:GITHUB_OUTPUT
          }

      - name: Commit promoted changelog
        if: steps.changelog.outputs.changed == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          git add CHANGELOG.md
          git commit -m "chore: promote CHANGELOG for v$version [skip ci]"
          git push

      - name: Install PyTorch (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install desktop build tools
        run: pip install -e ".[desktop]"

      - name: Build executable
        run: pyinstaller --noconfirm build/splitter-desktop.spec

      - name: Bundle ffmpeg
        shell: pwsh
        run: |
          $ffmpegZip = "$env:RUNNER_TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpegBin = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ffmpegBin) { throw "ffmpeg.exe not found in downloaded archive." }
          Copy-Item $ffmpegBin.FullName "dist/AudioSplitter/ffmpeg.exe"

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/AudioSplitter/*" -DestinationPath "AudioSplitter-Windows-x64.zip" -Force

      - name: Resolve version tag
        id: version
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          $tag = "v${version}-build.${{ github.run_number }}"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        run: python scripts/sync_changelog.py --extract release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Audio Splitter ${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body_path: release-notes.md
          files: AudioSplitter-Windows-x64.zip
          make_latest: true
